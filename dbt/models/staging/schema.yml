version: 2

models:
  - name: stg_measurements
    description: >
      One row per sensor measurement (hourly 'raw' period), parsed from
      verbatim API pages (G1) and deduped across append batches (G4).
      Identity (sensor_id, country_code) is parsed from source_uri.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [sensor_id, period_start_utc]
    columns:
      - name: sensor_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_sensors')
              field: sensor_id
      - name: country_code
        data_tests:
          - not_null
          - accepted_values:
              values: [AE, PK]
      - name: parameter
        description: >
          Only the ingestion targets (TARGET_PARAMETERS) can appear; widening
          that frozenset must consciously widen this test too.
        data_tests:
          - not_null
          - accepted_values:
              values: [pm25, pm10, no2]
      - name: measurement_value
        description: >
          Can be null: the API serves records with "value": null when a
          station transmits without a reading (first seen in the Phase 5
          backfill — sensor 13144205, 2026-04). Staging keeps the row
          (faithful parse); int_daily_aqi excludes valueless records so G7's
          completeness columns count only real readings. Warn severity keeps
          the volume visible without failing the build.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: unit
        description: >
          Threshold-join key (G5): the marts match values to WHO guidelines on
          pollutant AND unit, so an unexpected unit here silently nulls the
          exceedance flag and shrinks the rate denominator downstream. All
          current target parameters report µg/m³; widening TARGET_PARAMETERS
          must consciously widen this test too.
        data_tests:
          - not_null
          - accepted_values:
              values: ["µg/m³"]
      - name: period_start_utc
        data_tests:
          - not_null

  - name: stg_locations
    description: One row per monitoring station, latest ingested metadata.
    columns:
      - name: location_id
        data_tests: [unique, not_null]
      - name: country_code
        data_tests:
          - not_null
          - accepted_values:
              values: [AE, PK]
      - name: is_reference_monitor
        data_tests: [not_null]
      - name: datetime_first_utc
        description: >
          First measurement timestamp the API reports for the station; null if
          it has never reported. Gap-audit input (Phase 5) — no not_null test
          on purpose.
      - name: datetime_last_utc
        description: >
          Latest measurement timestamp the API reports for the station; null
          if it has never reported.

  - name: stg_sensors
    description: One row per sensor — the sensor -> location bridge.
    columns:
      - name: sensor_id
        data_tests: [unique, not_null]
      - name: location_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_locations')
              field: location_id
      - name: parameter
        data_tests: [not_null]

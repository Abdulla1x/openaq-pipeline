name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      # Blocking since Phase 4 (deliberate decision, 2026-07-17): SQL style
      # violations fail the job, same as ruff. Dialect/templater come from
      # the repo-root .sqlfluff config.
      - name: SQLFluff lint
        run: sqlfluff lint dbt/models

  dbt-parse:
    name: dbt-parse
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: dummy-project
      BIGQUERY_DATASET: openaq_dbt
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/fake-key.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dbt
        run: pip install dbt-core==1.8.3 dbt-bigquery==1.8.2
      - name: Create fake credentials file
        run: echo '{}' > /tmp/fake-key.json
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: dbt parse
        working-directory: dbt
        run: dbt parse
        env:
          DBT_PROFILES_DIR: .

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.8'
      - name: Terraform fmt
        run: terraform fmt -check -recursive
      - name: Terraform init (no backend — validation needs no GCP credentials)
        run: terraform init -backend=false -input=false
      - name: Terraform validate
        run: terraform validate

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and dev dependencies
        run: pip install -e . -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/unit/ -v

  dag-validate:
    name: dag-validate
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: test-project
      GCS_BUCKET_NAME: test-bucket
      BIGQUERY_RAW_DATASET: openaq_raw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # Mirrors the Airflow image build: core + image requirements resolved
      # together under the official constraints (an unconstrained install
      # lets pip drift transitive deps — numpy 2.x broke the image's pandas).
      - name: Install Airflow + image requirements + package
        run: |
          pip install "apache-airflow==2.9.1" -r airflow/requirements.txt --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.1/constraints-3.12.txt"
          pip install -e . -r requirements-dev.txt
      - name: Guard against dependency drift from the project install
        run: pip check
      - name: DAG integrity tests
        run: pytest tests/dags/ -v

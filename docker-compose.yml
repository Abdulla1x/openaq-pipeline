x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-REPLACE_ME_generate_with_python_-c_"from_cryptography.fernet_import_Fernet;print(Fernet.generate_key().decode())"}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-changeme}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # GCP / OpenAQ
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET}
    BIGQUERY_RAW_DATASET: ${BIGQUERY_RAW_DATASET:-openaq_raw}
    # Container path, deliberately NOT the .env value — .env holds the HOST
    # path for CLI runs; inside the container the key is the volume mount below.
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/keys/service-account.json
    # G10: GCP operators/hooks authenticate via an Airflow Connection
    # (gcp_conn_id="google_cloud_default"), defined here in JSON form.
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: '{"conn_type": "google_cloud_platform", "extra": {"key_path": "/opt/airflow/keys/service-account.json", "project": "${GCP_PROJECT_ID}"}}'
    OPENAQ_API_KEY: ${OPENAQ_API_KEY}
    OPENAQ_API_BASE_URL: ${OPENAQ_API_BASE_URL:-https://api.openaq.org/v3}
    # DAGs import ingestion.openaq.* from the volume mount below.
    PYTHONPATH: /opt/airflow
    # dbt
    DBT_PROJECT_DIR: ${DBT_PROJECT_DIR:-/opt/airflow/dbt}
    DBT_PROFILES_DIR: ${DBT_PROFILES_DIR:-/opt/airflow/dbt}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - ${GCP_KEY_FILE:?set GCP_KEY_FILE in .env to the host path of the service-account key}:/opt/airflow/keys/service-account.json:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        airflow pools set openaq_api 4 "OpenAQ v3 rate-limit budget (60 req/min shared across mapped fetch tasks)"
    restart: "no"

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
